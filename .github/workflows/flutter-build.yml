name: Build Flutter APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
# 打包Android
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Debug - List root
        run: ls -la

      - name: Debug - List simple_live_app
        run: ls -la ./simple_live_app

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.38.x"
          cache: true

      - name: Install dependencies
        run: flutter pub get
        working-directory: ./simple_live_app
          
      # 【核心修复步骤 - 最终版】
      # 1. 移除 "as String" (防止 null 崩溃)
      # 2. 添加 "as? String" (解决 Any 到 String? 的类型不匹配)
      # 3. 添加 "?: """ (提供默认空值)
      - name: Patch build.gradle.kts for Type Safety
        working-directory: ./simple_live_app/android/app
        run: |
          echo "🔧 Patching build.gradle.kts..."
          cp build.gradle.kts build.gradle.kts.bak
          
          # 原始代码模式: keystoreProperties["..."] as String
          # 目标代码模式: (keystoreProperties["..."] as? String) ?: ""
          
          # 解释正则:
          # \(keystoreProperties\[[^]]*\])  -> 捕获组1: keystoreProperties["keyName"]
          #  as String                      -> 匹配后面的 " as String"
          # 替换为:
          # (\1 as? String) ?: ""           -> (捕获组1 as? String) ?: ""
          
          sed -i 's/\(keystoreProperties\[[^]]*\]\) as String/(\1 as? String) ?: ""/g' build.gradle.kts
          
          echo "✅ Patch applied. Showing diff:"
          diff build.gradle.kts.bak build.gradle.kts || true
          
          # 额外检查：如果还有单独的访问没有 as String 但可能返回 Any 的情况，也可以统一处理
          # 但通常上面的替换足以解决你提供的代码片段中的问题

      - name: Build APK (Debug)
        # 注意：这里依然可以跑 debug，因为修复后的代码即使拿到空值也不会崩
        # Android Gradle 插件在 Debug 模式下会自动忽略空的 signingConfig 或使用默认 debug 签名
        run: flutter build apk --debug
        working-directory: ./simple_live_app

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: simple_live_app/build/app/outputs/flutter-apk/app-debug.apk
          
