name: Build Flutter APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Debug - List root
        run: ls -la

      - name: Debug - List simple_live_app
        run: ls -la ./simple_live_app

      - name: Set up Flutter (3.22.0)
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.22.0'

      - name: Install dependencies
        run: flutter pub get
        working-directory: ./simple_live_app

      - name: Build APK (Release)
        run: flutter build apk --release
        working-directory: ./simple_live_app

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: simple_live_app/build/app/outputs/flutter-apk/app-release.apk
