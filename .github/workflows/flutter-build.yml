name: Build Flutter APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
# 打包Android
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Debug - List root
        run: ls -la

      - name: Debug - List simple_live_app
        run: ls -la ./simple_live_app

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.38.x"
          cache: true

      - name: Install dependencies
        run: flutter pub get
        working-directory: ./simple_live_app
          
      # 【核心修复步骤】
      # 动态修改 build.gradle.kts，移除会导致崩溃的 "as String" 强制转换
      # 原理：将 '...["key"] as String' 替换为 '...["key"] ?: ""'
      # 这样如果取不到值，就变成空字符串，而不是抛异常
      - name: Patch build.gradle.kts for Debug Build
        working-directory: ./simple_live_app/android/app
        run: |
          echo "🔧 Patching build.gradle.kts to prevent null cast errors..."
          
          # 备份原文件以便调试
          cp build.gradle.kts build.gradle.kts.bak
          
          # 执行替换逻辑：
          # 匹配模式：["keyName"] as String
          # 替换为：["keyName"] ?: ""
          # 解释：?: "" 是 Kotlin 的埃尔维斯运算符，如果左边是 null，则返回右边的空字符串
          sed -i 's/\(keystoreProperties\[[^]]*\]\) as String/\1 ?: ""/g' build.gradle.kts
          
          echo "✅ Patch applied. Showing diff:"
          diff build.gradle.kts.bak build.gradle.kts || true

      - name: Build APK (Debug)
        # 注意：这里依然可以跑 debug，因为修复后的代码即使拿到空值也不会崩
        # Android Gradle 插件在 Debug 模式下会自动忽略空的 signingConfig 或使用默认 debug 签名
        run: flutter build apk --debug
        working-directory: ./simple_live_app

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: simple_live_app/build/app/outputs/flutter-apk/app-debug.apk
          
